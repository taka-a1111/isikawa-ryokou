<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅のしおり｜岐阜・福井・石川 キャンプ車旅 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Outfit:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:  #2A4D14;
  --green2: #3E6B1F;
  --leaf:   #6AAB30;
  --earth:  #7B5133;
  --sand:   #F5EDDB;
  --cream:  #FAFAF5;
  --white:  #FFFFFF;
  --text:   #1E1E1E;
  --mid:    #5A5A5A;
  --light:  #8A8A8A;
  --border: #E0D8C8;
  --warn:   #C05B00;
  --shadow: 0 3px 16px rgba(0,0,0,.10);
  --radius: 10px;
}
html{scroll-behavior:smooth}
body{
  font-family:'Zen Kaku Gothic New',sans-serif;
  background:var(--cream);color:var(--text);
  overflow-x:hidden;line-height:1.65;
}

/* === FONTS === */
.font-mincho{font-family:'Shippori Mincho',serif}
.font-outfit{font-family:'Outfit',sans-serif}

/* === HEADER === */
.site-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
  transition:.3s;
}
.site-header.scrolled{background:rgba(30,60,12,.95);backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-logo{
  font-family:'Shippori Mincho',serif;font-size:.95rem;color:#fff;
  text-decoration:none;letter-spacing:.1em;display:flex;align-items:center;gap:8px;
}
.header-nav{display:flex;gap:20px}
.header-nav a{color:rgba(255,255,255,.85);text-decoration:none;font-size:.78rem;
  letter-spacing:.08em;transition:.2s;font-family:'Outfit',sans-serif;text-transform:uppercase}
.header-nav a:hover{color:#fff}
@media(max-width:600px){.header-nav{display:none}}

/* === HERO === */
.hero{
  position:relative;min-height:100vh;
  display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;
}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.5)}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(10,30,5,.6) 0%,rgba(30,60,12,.3) 60%,rgba(80,50,20,.2) 100%);
}
.hero-content{position:relative;z-index:2;color:#fff;padding:20px}
.hero-kicker{
  display:inline-flex;align-items:center;gap:10px;
  font-family:'Outfit',sans-serif;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
  margin-bottom:16px;
}
.hero-kicker::before,.hero-kicker::after{content:'';flex:1 1 40px;height:1px;background:rgba(255,255,255,.5)}
.hero-title{
  font-family:'Shippori Mincho',serif;font-size:clamp(2.2rem,5.5vw,3.8rem);
  font-weight:700;line-height:1.25;margin-bottom:10px;
  text-shadow:0 2px 16px rgba(0,0,0,.5);
}
.hero-sub{font-size:clamp(.88rem,2vw,1.05rem);opacity:.85;margin-bottom:28px;letter-spacing:.06em}
.hero-stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.hero-stat{
  background:rgba(255,255,255,.12);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.2);border-radius:8px;
  padding:8px 16px;font-family:'Outfit',sans-serif;font-size:.8rem;
  display:flex;align-items:center;gap:6px;
}
.hero-stat strong{font-size:1.1rem;font-weight:700}
.hero-scroll{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,.65);font-family:'Outfit',sans-serif;
  font-size:.65rem;letter-spacing:.15em;
  display:flex;flex-direction:column;align-items:center;gap:8px;text-transform:uppercase;
}
.scroll-line{width:1px;height:44px;background:linear-gradient(to bottom,rgba(255,255,255,.6),transparent);animation:scrollAnim 2s infinite}
@keyframes scrollAnim{
  0%{transform:scaleY(0);transform-origin:top}
  50%{transform:scaleY(1);transform-origin:top}
  51%{transform:scaleY(1);transform-origin:bottom}
  100%{transform:scaleY(0);transform-origin:bottom}
}

/* === SECTION === */
.section{padding:64px 24px}
.section-inner{max-width:860px;margin:0 auto}
.section-kicker{
  font-family:'Outfit',sans-serif;font-size:.68rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--leaf);font-weight:700;margin-bottom:6px;
}
.section-title{
  font-family:'Shippori Mincho',serif;font-size:clamp(1.4rem,3vw,1.9rem);
  color:var(--green);margin-bottom:36px;padding-bottom:14px;
  border-bottom:2px solid var(--leaf);display:inline-block;
}

/* === TIMELINE === */
.day-block{margin-bottom:0}
.day-timeline{display:flex;gap:0;align-items:flex-start}

/* 左カラム：番号バッジ + 縦線 */
.day-badge-wrap{
  display:flex;flex-direction:column;align-items:center;
  width:56px;flex-shrink:0;
  position:sticky;top:72px;align-self:flex-start;z-index:10;
}
.day-num-badge{
  font-family:'Outfit',sans-serif;font-size:.62rem;font-weight:700;
  letter-spacing:.08em;text-align:center;
  width:48px;height:48px;border-radius:50%;
  background:var(--green);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
  flex-direction:column;line-height:1.2;
}
.day-num-badge span{font-size:1.1rem;font-weight:800}
.timeline-line{width:2px;background:var(--border);min-height:200px;flex:1}

/* 右カラム：コンテンツ */
.day-content{flex:1;padding-left:16px;padding-bottom:40px}
.day-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-wrap:wrap;gap:8px;margin-bottom:12px;
}
.day-date-wrap{display:flex;flex-direction:column;gap:2px}
.day-date{
  font-family:'Shippori Mincho',serif;font-size:1.25rem;font-weight:700;color:var(--green);
}
.day-theme{font-size:.82rem;color:var(--mid)}
.day-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start;padding-top:4px}
.day-badge{
  font-family:'Outfit',sans-serif;font-size:.68rem;font-weight:700;
  letter-spacing:.05em;padding:3px 10px;border-radius:20px;
}

/* === DAY MAP === */
.day-map{height:190px;border-radius:var(--radius);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.day-map iframe{width:100%;height:100%;border:none;display:block}

/* === SPOT LIST === */
.spot-list{list-style:none;background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.spot-row{
  display:flex;align-items:center;flex-wrap:wrap;gap:6px;
  padding:10px 14px;border-bottom:1px solid var(--border);
  transition:.15s;
}
.spot-row:last-child{border-bottom:none}
.spot-row:hover{background:var(--sand)}

.spot-type-tag{
  font-size:.66rem;font-weight:700;letter-spacing:.08em;
  padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;
}
.spot-name{font-weight:700;font-size:.95rem;color:var(--text);min-width:0;flex:1 1 auto;word-break:break-word;line-height:1.4}
.spot-hours{
  font-size:.75rem;color:var(--mid);
  display:inline-flex;align-items:center;gap:3px;
  flex-shrink:0;
}
.spot-open{
  font-size:.68rem;font-weight:700;letter-spacing:.05em;
  padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;
}
.spot-map-btn{
  margin-left:auto;display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:6px;flex-shrink:0;
  background:#E8F5E2;color:#2E7D32;border:1px solid #A5D6A7;
  text-decoration:none;transition:.15s;
}
.spot-map-btn:hover{background:#C8E6C9}
.spot-note{
  width:100%;font-size:.73rem;color:var(--light);
  padding-left:2px;line-height:1.5;
}
.badge-reserve{
  font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:4px;
  background:#FFF9C4;color:#856200;border:1px solid #F9D64F;flex-shrink:0;
}

/* === NOTICE BOX === */
.notice-box{
  background:#FFF8EC;border-left:4px solid var(--warn);
  border-radius:0 var(--radius) var(--radius) 0;
  padding:12px 16px;margin-bottom:12px;
}
.notice-box strong{
  color:var(--warn);font-size:.82rem;
  display:flex;align-items:center;gap:6px;margin-bottom:4px;
}
.notice-box p{font-size:.78rem;color:var(--mid);line-height:1.6}

/* === NOTES SECTION === */
.note-card{
  background:#fff;border-radius:var(--radius);border:1px solid var(--border);
  padding:16px 20px;margin-bottom:14px;box-shadow:var(--shadow);
}
.note-card strong{font-size:.85rem;color:var(--warn);display:block;margin-bottom:4px}
.note-card p{font-size:.82rem;color:var(--mid);line-height:1.65}

/* === FOOTER === */
.site-footer{
  background:var(--green);color:rgba(255,255,255,.75);
  text-align:center;padding:32px 24px;font-size:.78rem;line-height:1.8;
}
.site-footer strong{
  font-family:'Shippori Mincho',serif;color:#fff;
  display:block;font-size:1rem;margin-bottom:6px;
}

/* === REVEAL ANIMATION === */
.reveal{opacity:0;transform:translateY(20px);transition:.6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* === RESPONSIVE === */
@media(max-width:600px){
  .section{padding:44px 14px}
  .day-badge-wrap{width:42px}
  .day-num-badge{width:40px;height:40px;font-size:.58rem}
  .day-content{padding-left:10px}
  .day-map{height:170px}
  .spot-row{padding:9px 10px;gap:5px}
  .spot-name{font-size:.88rem}
  .spot-map-btn{margin-left:auto}
}

</style>
</head>
